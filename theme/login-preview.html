<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户信息管理系统 - 登录</title>
    <link rel="stylesheet" href="https://unpkg.com/@arco-design/web-vue@2.56.3/dist/arco.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@arco-design/web-vue@2.56.3/dist/arco-vue.min.js"></script>
    <script src="https://unpkg.com/@arco-design/web-vue@2.56.3/dist/arco-vue-icon.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
        }
        
        .login-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px;
            min-height: 640px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        /* 左侧品牌区域 */
        .brand-section {
            flex: 1;
            background: linear-gradient(145deg, #165dff 0%, #2b6de5 50%, #4080ff 100%);
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }
        
        .brand-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .brand-header {
            position: relative;
            z-index: 1;
        }
        
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .brand-name {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .brand-title {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 20px;
        }
        
        .brand-subtitle {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .brand-stats {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 60px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .brand-footer {
            position: relative;
            z-index: 1;
            font-size: 13px;
            opacity: 0.7;
            margin-top: 40px;
        }
        
        /* 右侧登录区域 */
        .login-section {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .login-header {
            margin-bottom: 40px;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 600;
            color: #1d2129;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: #86909c;
        }
        
        .login-form {
            max-width: 400px;
        }
        
        .form-item {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d2129;
            margin-bottom: 8px;
        }
        
        .login-input {
            width: 100%;
        }
        
        .login-input :deep(.arco-input-wrapper) {
            height: 44px;
            border-radius: 8px;
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .forgot-link {
            font-size: 14px;
            color: #165dff;
            cursor: pointer;
        }
        
        .forgot-link:hover {
            color: #4080ff;
        }
        
        .login-btn {
            width: 100%;
            height: 44px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            background: linear-gradient(135deg, #165dff 0%, #2b6de5 100%);
            border: none;
        }
        
        .login-btn:hover {
            background: linear-gradient(135deg, #2b6de5 0%, #4080ff 100%);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: #86909c;
            font-size: 14px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e6eb;
        }
        
        .divider span {
            padding: 0 16px;
        }
        
        .login-tips {
            text-align: center;
            margin-top: 24px;
        }
        
        .login-tips p {
            font-size: 13px;
            color: #86909c;
            margin-bottom: 8px;
        }
        
        .role-tags {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        /* 响应式 */
        @media (max-width: 992px) {
            .login-wrapper {
                flex-direction: column;
                max-width: 480px;
            }
            
            .brand-section {
                padding: 40px 30px;
                min-height: 300px;
            }
            
            .brand-title {
                font-size: 28px;
            }
            
            .login-section {
                padding: 40px 30px;
            }
        }
        
        @media (max-width: 576px) {
            .brand-stats {
                grid-template-columns: 1fr;
            }
            
            .brand-section,
            .login-section {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-wrapper">
                <!-- 左侧品牌区域 -->
                <div class="brand-section">
                    <div>
                        <div class="brand-header">
                            <div class="brand-logo">
                                <div class="logo-icon">
                                    <icon-user-group />
                                </div>
                                <span class="brand-name">客户运营中台</span>
                            </div>
                            <h1 class="brand-title">数据驱动的<br>客户运营管理</h1>
                            <p class="brand-subtitle">
                                告别 Excel 分散管理，实现客户健康度自动监控<br>
                                结算单自动生成，运营效率提升 70%
                            </p>
                        </div>
                        
                        <div class="brand-stats">
                            <div class="stat-card">
                                <div class="stat-number">1,320</div>
                                <div class="stat-label">客户总数</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">82.5%</div>
                                <div class="stat-label">活跃客户率</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">2h</div>
                                <div class="stat-label">结算生成时间</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">99.9%</div>
                                <div class="stat-label">数据准确率</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="brand-footer">
                        © 2026 客户运营中台系统 v1.0 | 企业内部管理系统
                    </div>
                </div>
                
                <!-- 右侧登录区域 -->
                <div class="login-section">
                    <div class="login-header">
                        <h2 class="login-title">欢迎回来</h2>
                        <p class="login-subtitle">请登录您的账户以继续</p>
                    </div>
                    
                    <div class="login-form">
                        <div class="form-item">
                            <label class="form-label">用户名</label>
                            <a-input
                                v-model="form.username"
                                placeholder="请输入用户名"
                                class="login-input"
                                size="large"
                            >
                                <template #prefix>
                                    <icon-user />
                                </template>
                            </a-input>
                        </div>
                        
                        <div class="form-item">
                            <label class="form-label">密码</label>
                            <a-input-password
                                v-model="form.password"
                                placeholder="请输入密码"
                                class="login-input"
                                size="large"
                            >
                                <template #prefix>
                                    <icon-lock />
                                </template>
                            </a-input-password>
                        </div>
                        
                        <div class="form-options">
                            <a-checkbox v-model="form.remember">记住我</a-checkbox>
                            <span class="forgot-link">忘记密码？</span>
                        </div>
                        
                        <a-button
                            type="primary"
                            class="login-btn"
                            size="large"
                            @click="handleLogin"
                            :loading="loading"
                        >
                            登 录
                        </a-button>
                        
                        <div class="divider">
                            <span>快捷入口</span>
                        </div>
                        
                        <div class="login-tips">
                            <p>测试账号</p>
                            <div class="role-tags">
                                <a-tag color="arcoblue">admin / admin123</a-tag>
                                <a-tag color="green">manager / manager123</a-tag>
                                <a-tag color="orange">specialist / specialist123</a-tag>
                                <a-tag color="purple">sales / sales123</a-tag>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, reactive, ref } = Vue;
        const { Message } = ArcoVue;
        
        createApp({
            setup() {
                const form = reactive({
                    username: '',
                    password: '',
                    remember: false
                });
                
                const loading = ref(false);
                
                const handleLogin = () => {
                    if (!form.username) {
                        Message.warning('请输入用户名');
                        return;
                    }
                    if (!form.password) {
                        Message.warning('请输入密码');
                        return;
                    }
                    
                    loading.value = true;
                    
                    setTimeout(() => {
                        loading.value = false;
                        Message.success('登录成功');
                        window.location.href = 'dashboard-preview.html';
                    }, 1500);
                };
                
                return {
                    form,
                    loading,
                    handleLogin
                };
            }
        })
        .use(ArcoVue)
        .use(ArcoVueIcon)
        .mount('#app');
    </script>
</body>
</html>
