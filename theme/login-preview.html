<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理系统 - 登录</title>
    <link rel="stylesheet" href="https://unpkg.com/@arco-design/web-vue@2.54.0/dist/arco.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .login-container {
            display: flex;
            height: 100vh;
            min-height: 600px;
        }

        .brand-section {
            flex: 1;
            background: linear-gradient(135deg, #165DFF 0%, #0E42D2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .brand-section::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            top: -200px;
            right: -200px;
        }

        .brand-section::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
        }

        .brand-content {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 48px;
        }

        .brand-logo-icon {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
        }

        .brand-logo-text {
            font-size: 28px;
            font-weight: 600;
        }

        .brand-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.3;
        }

        .brand-subtitle {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.8;
            margin-bottom: 48px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
        }

        .login-section {
            flex: 0 0 480px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
        }

        .login-header {
            margin-bottom: 48px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 600;
            color: #1D2129;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #86909C;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1D2129;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 44px;
            padding: 0 16px;
            border: 1px solid #C9CDD4;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #165DFF;
            box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #4E5969;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            font-size: 14px;
            color: #165DFF;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            height: 44px;
            background: #165DFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-button:hover {
            background: #0E42D2;
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: #C9CDD4;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E5E6EB;
        }

        .divider span {
            padding: 0 16px;
        }

        .quick-login {
            margin-bottom: 32px;
        }

        .quick-login-title {
            font-size: 14px;
            color: #86909C;
            margin-bottom: 16px;
        }

        .quick-accounts {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .account-btn {
            padding: 8px 16px;
            background: #F2F3F5;
            border: 1px solid #E5E6EB;
            border-radius: 6px;
            font-size: 13px;
            color: #4E5969;
            cursor: pointer;
            transition: all 0.2s;
        }

        .account-btn:hover {
            background: #E5E6EB;
            border-color: #C9CDD4;
        }

        .account-btn.admin {
            border-left: 3px solid #165DFF;
        }

        .account-btn.manager {
            border-left: 3px solid #00B42A;
        }

        .account-btn.specialist {
            border-left: 3px solid #FF7D00;
        }

        .account-btn.sales {
            border-left: 3px solid #86909C;
        }

        .login-footer {
            margin-top: auto;
            text-align: center;
            font-size: 12px;
            color: #86909C;
        }

        .login-footer a {
            color: #165DFF;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .login-container {
                flex-direction: column;
            }

            .brand-section {
                flex: none;
                height: 40vh;
                min-height: 300px;
                padding: 40px 30px;
            }

            .brand-title {
                font-size: 24px;
            }

            .brand-subtitle {
                font-size: 14px;
                margin-bottom: 32px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .stat-card {
                padding: 16px;
            }

            .stat-value {
                font-size: 24px;
            }

            .login-section {
                flex: 1;
                flex-basis: auto;
                padding: 40px 30px;
            }
        }

        @media (max-width: 480px) {
            .brand-section {
                display: none;
            }

            .login-section {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand-section">
            <div class="brand-content">
                <div class="brand-logo">
                    <div class="brand-logo-icon">CM</div>
                    <div class="brand-logo-text">客户管理系统</div>
                </div>
                <h1 class="brand-title">数据驱动的<br>客户运营中台</h1>
                <p class="brand-subtitle">
                    集中管理 1320+ 客户数据，自动监控健康度，智能识别流失风险，让运营效率提升 70%
                </p>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">1,320</div>
                        <div class="stat-label">客户总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">82.5%</div>
                        <div class="stat-label">活跃客户</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">-15%</div>
                        <div class="stat-label">流失率降低</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">+70%</div>
                        <div class="stat-label">效率提升</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-section">
            <div class="login-header">
                <h2 class="login-title">欢迎回来</h2>
                <p class="login-subtitle">请登录您的账户</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" placeholder="请输入用户名" value="admin">
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" value="password123">
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" checked>
                        记住我
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>

                <button type="submit" class="login-button">登 录</button>
            </form>

            <div class="divider">
                <span>快捷登录</span>
            </div>

            <div class="quick-login">
                <p class="quick-login-title">选择测试账号快速登录：</p>
                <div class="quick-accounts">
                    <button class="account-btn admin" data-username="admin" data-password="password123">
                        系统管理员
                    </button>
                    <button class="account-btn manager" data-username="manager" data-password="password123">
                        运营经理
                    </button>
                    <button class="account-btn specialist" data-username="specialist" data-password="password123">
                        运营专员
                    </button>
                    <button class="account-btn sales" data-username="sales" data-password="password123">
                        销售代表
                    </button>
                </div>
            </div>

            <div class="login-footer">
                <p>还没有账户？<a href="#">联系管理员开通</a></p>
                <p style="margin-top: 8px;">© 2026 客户管理系统. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const accountBtns = document.querySelectorAll('.account-btn');

        accountBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                usernameInput.value = btn.dataset.username;
                passwordInput.value = btn.dataset.password;
                
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    btn.style.transform = 'scale(1)';
                }, 100);
            });
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('登录成功！即将跳转到 Dashboard...');
        });
    </script>
</body>
</html>
