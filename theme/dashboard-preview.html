<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户信息管理系统 - 仪表盘</title>
    <link rel="stylesheet" href="https://unpkg.com/@arco-design/web-vue@2.56.3/dist/arco.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@arco-design/web-vue@2.56.3/dist/arco-vue.min.js"></script>
    <script src="https://unpkg.com/@arco-design/web-vue@2.56.3/dist/arco-vue-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f2f3f5;
            min-height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #1d2129 0%, #0a0c10 100%);
            z-index: 100;
            transition: all 0.3s;
        }
        
        .sidebar-header {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #165dff 0%, #4080ff 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 12px;
        }
        
        .sidebar-title {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
        }
        
        .sidebar-menu {
            padding: 16px 12px;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: rgba(255,255,255,0.7);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        
        .menu-item:hover {
            background: rgba(255,255,255,0.05);
            color: #ffffff;
        }
        
        .menu-item.active {
            background: linear-gradient(135deg, #165dff 0%, #2b6de5 100%);
            color: #ffffff;
        }
        
        .menu-icon {
            margin-right: 12px;
            font-size: 18px;
        }
        
        .menu-text {
            font-size: 14px;
        }
        
        /* 主内容区 */
        .main-content {
            margin-left: 240px;
            min-height: 100vh;
        }
        
        /* 顶部导航 */
        .top-header {
            height: 64px;
            background: #ffffff;
            border-bottom: 1px solid #e5e6eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 99;
        }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #86909c;
            font-size: 14px;
        }
        
        .breadcrumb-item {
            color: #165dff;
            cursor: pointer;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .header-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            color: #4e5969;
            transition: all 0.2s;
        }
        
        .header-icon:hover {
            background: #f2f3f5;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .user-info:hover {
            background: #f2f3f5;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #165dff 0%, #4080ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
        }
        
        .user-name {
            font-size: 14px;
            color: #1d2129;
            font-weight: 500;
        }
        
        /* 仪表盘内容 */
        .dashboard-content {
            padding: 24px;
        }
        
        /* 欢迎横幅 */
        .welcome-banner {
            background: linear-gradient(135deg, #165dff 0%, #2b6de5 50%, #4080ff 100%);
            border-radius: 16px;
            padding: 32px;
            color: white;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        
        .welcome-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 60%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: rotate(-15deg);
        }
        
        .welcome-content {
            position: relative;
            z-index: 1;
        }
        
        .welcome-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .welcome-subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        
        .welcome-stats {
            display: flex;
            gap: 40px;
        }
        
        .welcome-stat {
            display: flex;
            flex-direction: column;
        }
        
        .welcome-stat-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .welcome-stat-label {
            font-size: 13px;
            opacity: 0.8;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .stat-icon.blue {
            background: rgba(22, 93, 255, 0.1);
            color: #165dff;
        }
        
        .stat-icon.green {
            background: rgba(0, 180, 42, 0.1);
            color: #00b42a;
        }
        
        .stat-icon.orange {
            background: rgba(255, 125, 0, 0.1);
            color: #ff7d00;
        }
        
        .stat-icon.red {
            background: rgba(245, 63, 63, 0.1);
            color: #f53f3f;
        }
        
        .stat-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .stat-trend.up {
            color: #00b42a;
        }
        
        .stat-trend.down {
            color: #f53f3f;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1d2129;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #86909c;
        }
        
        /* 图表区域 */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .chart-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #1d2129;
        }
        
        .chart-actions {
            display: flex;
            gap: 8px;
        }
        
        .chart-container {
            height: 300px;
        }
        
        .chart-container-small {
            height: 300px;
        }
        
        /* 底部区域 */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .table-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .table-title {
            font-size: 16px;
            font-weight: 600;
            color: #1d2129;
        }
        
        .view-all {
            font-size: 14px;
            color: #165dff;
            cursor: pointer;
        }
        
        .view-all:hover {
            color: #4080ff;
        }
        
        /* 风险客户标签 */
        .risk-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .risk-badge.high {
            background: rgba(245, 63, 63, 0.1);
            color: #f53f3f;
        }
        
        .risk-badge.medium {
            background: rgba(255, 125, 0, 0.1);
            color: #ff7d00;
        }
        
        .risk-badge.low {
            background: rgba(255, 202, 43, 0.1);
            color: #f7ba1e;
        }
        
        /* 价值等级标签 */
        .tier-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
        }
        
        .tier-badge.S {
            background: linear-gradient(135deg, #ff7d00 0%, #ff9a2e 100%);
            color: white;
        }
        
        .tier-badge.A {
            background: linear-gradient(135deg, #165dff 0%, #4080ff 100%);
            color: white;
        }
        
        .tier-badge.B {
            background: linear-gradient(135deg, #00b42a 0%, #23c343 100%);
            color: white;
        }
        
        .tier-badge.C {
            background: linear-gradient(135deg, #86909c 0%, #a5abb3 100%);
            color: white;
        }
        
        .tier-badge.D {
            background: linear-gradient(135deg, #c9cdd4 0%, #e5e6eb 100%);
            color: #4e5969;
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .bottom-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .welcome-stats {
                flex-wrap: wrap;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <icon-user-group />
                </div>
                <span class="sidebar-title">客户运营中台</span>
            </div>
            
            <div class="sidebar-menu">
                <div class="menu-item active">
                    <span class="menu-icon"><icon-dashboard /></span>
                    <span class="menu-text">仪表盘</span>
                </div>
                <div class="menu-item">
                    <span class="menu-icon"><icon-user /></span>
                    <span class="menu-text">客户管理</span>
                </div>
                <div class="menu-item">
                    <span class="menu-icon"><icon-bar-chart /></span>
                    <span class="menu-text">健康度监控</span>
                </div>
                <div class="menu-item">
                    <span class="menu-icon"><icon-star /></span>
                    <span class="menu-text">价值评估</span>
                </div>
                <div class="menu-item">
                    <span class="menu-icon"><icon-file /></span>
                    <span class="menu-text">结算管理</span>
                </div>
                <div class="menu-item">
                    <span class="menu-icon"><icon-swap /></span>
                    <span class="menu-text">客户转移</span>
                </div>
                <div class="menu-item">
                    <span class="menu-icon"><icon-history /></span>
                    <span class="menu-text">操作日志</span>
                </div>
                <div class="menu-item">
                    <span class="menu-icon"><icon-settings /></span>
                    <span class="menu-text">系统设置</span>
                </div>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 顶部导航 -->
            <div class="top-header">
                <div class="breadcrumb">
                    <span class="breadcrumb-item">首页</span>
                    <icon-right />
                    <span>仪表盘</span>
                </div>
                
                <div class="header-actions">
                    <div class="header-icon">
                        <icon-notification />
                    </div>
                    <div class="header-icon">
                        <icon-question-circle />
                    </div>
                    <div class="user-info">
                        <div class="user-avatar">管</div>
                        <span class="user-name">管理员</span>
                        <icon-down />
                    </div>
                </div>
            </div>
            
            <!-- 仪表盘内容 -->
            <div class="dashboard-content">
                <!-- 欢迎横幅 -->
                <div class="welcome-banner">
                    <div class="welcome-content">
                        <h2 class="welcome-title">👋 欢迎回来，管理员</h2>
                        <p class="welcome-subtitle">今天是 2026年3月5日，以下是您的运营概览</p>
                        <div class="welcome-stats">
                            <div class="welcome-stat">
                                <span class="welcome-stat-value">48</span>
                                <span class="welcome-stat-label">待处理预警</span>
                            </div>
                            <div class="welcome-stat">
                                <span class="welcome-stat-value">12</span>
                                <span class="welcome-stat-label">本月已唤醒</span>
                            </div>
                            <div class="welcome-stat">
                                <span class="welcome-stat-value">¥2.4M</span>
                                <span class="welcome-stat-label">本月结算金额</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon blue">
                                <icon-user-group />
                            </div>
                            <div class="stat-trend up">
                                <icon-arrow-up />
                                <span>+2.5%</span>
                            </div>
                        </div>
                        <div class="stat-value">1,320</div>
                        <div class="stat-label">客户总数</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon green">
                                <icon-check-circle />
                            </div>
                            <div class="stat-trend up">
                                <icon-arrow-up />
                                <span>+5.2%</span>
                            </div>
                        </div>
                        <div class="stat-value">1,089</div>
                        <div class="stat-label">活跃客户</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon orange">
                                <icon-exclamation-circle />
                            </div>
                            <div class="stat-trend down">
                                <icon-arrow-down />
                                <span>-1.2%</span>
                            </div>
                        </div>
                        <div class="stat-value">48</div>
                        <div class="stat-label">风险客户</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon red">
                                <icon-close-circle />
                            </div>
                            <div class="stat-trend down">
                                <icon-arrow-down />
                                <span>-3.8%</span>
                            </div>
                        </div>
                        <div class="stat-value">183</div>
                        <div class="stat-label">僵尸客户</div>
                    </div>
                </div>
                
                <!-- 图表区域 -->
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-header">
                            <span class="chart-title">客户健康度趋势</span>
                            <div class="chart-actions">
                                <a-radio-group type="button" size="small" v-model="trendPeriod">
                                    <a-radio value="week">本周</a-radio>
                                    <a-radio value="month">本月</a-radio>
                                    <a-radio value="quarter">本季</a-radio>
                                </a-radio-group>
                            </div>
                        </div>
                        <div ref="trendChart" class="chart-container"></div>
                    </div>
                    
                    <div class="chart-card">
                        <div class="chart-header">
                            <span class="chart-title">客户价值分布</span>
                        </div>
                        <div ref="tierChart" class="chart-container-small"></div>
                    </div>
                </div>
                
                <!-- 底部区域 -->
                <div class="bottom-grid">
                    <div class="table-card">
                        <div class="table-header">
                            <span class="table-title">⚠️ 风险客户预警</span>
                            <span class="view-all">查看全部</span>
                        </div>
                        <a-table
                            :columns="riskColumns"
                            :data="riskData"
                            :pagination="false"
                            size="small"
                        >
                            <template #tier="{ record }">
                                <span :class="['tier-badge', record.tier]">{{ record.tier }}</span>
                            </template>
                            <template #riskLevel="{ record }">
                                <span :class="['risk-badge', record.riskLevel]">
                                    <icon-exclamation-circle v-if="record.riskLevel === 'high'" />
                                    <icon-minus-circle v-else-if="record.riskLevel === 'medium'" />
                                    <icon-info-circle v-else />
                                    {{ record.riskLevel === 'high' ? '高风险' : record.riskLevel === 'medium' ? '中风险' : '低风险' }}
                                </span>
                            </template>
                            <template #action>
                                <a-button type="text" size="mini">查看</a-button>
                            </template>
                        </a-table>
                    </div>
                    
                    <div class="table-card">
                        <div class="table-header">
                            <span class="table-title">📋 最近结算记录</span>
                            <span class="view-all">查看全部</span>
                        </div>
                        <a-table
                            :columns="billingColumns"
                            :data="billingData"
                            :pagination="false"
                            size="small"
                        >
                            <template #status="{ record }">
                                <a-tag :color="record.status === '已发送' ? 'green' : record.status === '待发送' ? 'orange' : 'red'">
                                    {{ record.status }}
                                </a-tag>
                            </template>
                            <template #action>
                                <a-button type="text" size="mini">详情</a-button>
                            </template>
                        </a-table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, ref, onMounted } = Vue;
        
        createApp({
            setup() {
                const trendPeriod = ref('month');
                const trendChart = ref(null);
                const tierChart = ref(null);
                
                // 风险客户数据
                const riskColumns = [
                    { title: '客户名称', dataIndex: 'name', width: 150 },
                    { title: '等级', dataIndex: 'tier', slotName: 'tier', width: 60, align: 'center' },
                    { title: '未使用天数', dataIndex: 'days', width: 100, align: 'center' },
                    { title: '风险等级', dataIndex: 'riskLevel', slotName: 'riskLevel', width: 100 },
                    { title: '操作', slotName: 'action', width: 60, align: 'center' }
                ];
                
                const riskData = [
                    { name: 'XX 科技有限公司', tier: 'S', days: 14, riskLevel: 'high' },
                    { name: 'YY 贸易集团', tier: 'A', days: 10, riskLevel: 'high' },
                    { name: 'ZZ 建设公司', tier: 'B', days: 8, riskLevel: 'medium' },
                    { name: 'AA 装饰公司', tier: 'A', days: 7, riskLevel: 'medium' },
                    { name: 'BB 房产中介', tier: 'C', days: 12, riskLevel: 'low' }
                ];
                
                // 结算记录数据
                const billingColumns = [
                    { title: '月份', dataIndex: 'month', width: 80 },
                    { title: '客户数', dataIndex: 'count', width: 80, align: 'center' },
                    { title: '金额', dataIndex: 'amount', width: 120 },
                    { title: '状态', dataIndex: 'status', slotName: 'status', width: 80 },
                    { title: '操作', slotName: 'action', width: 60, align: 'center' }
                ];
                
                const billingData = [
                    { month: '2026-02', count: 1280, amount: '¥2,456,800', status: '已发送' },
                    { month: '2026-01', count: 1275, amount: '¥2,234,600', status: '已发送' },
                    { month: '2025-12', count: 1268, amount: '¥2,567,900', status: '已发送' },
                    { month: '2025-11', count: 1255, amount: '¥2,123,400', status: '异常' },
                    { month: '2025-10', count: 1250, amount: '¥2,345,200', status: '已发送' }
                ];
                
                // 初始化趋势图
                const initTrendChart = () => {
                    const chart = echarts.init(trendChart.value);
                    const option = {
                        tooltip: {
                            trigger: 'axis',
                            axisPointer: { type: 'cross' }
                        },
                        legend: {
                            data: ['活跃客户', '风险客户', '僵尸客户'],
                            bottom: 0
                        },
                        grid: {
                            left: '3%',
                            right: '4%',
                            bottom: '15%',
                            top: '10%',
                            containLabel: true
                        },
                        xAxis: {
                            type: 'category',
                            boundaryGap: false,
                            data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月']
                        },
                        yAxis: {
                            type: 'value'
                        },
                        series: [
                            {
                                name: '活跃客户',
                                type: 'line',
                                smooth: true,
                                data: [980, 1020, 1050, 1080, 1060, 1089, 1100, 1120, 1150, 1180, 1200, 1220],
                                areaStyle: { opacity: 0.1 },
                                itemStyle: { color: '#00b42a' }
                            },
                            {
                                name: '风险客户',
                                type: 'line',
                                smooth: true,
                                data: [45, 42, 40, 48, 52, 48, 46, 44, 42, 40, 38, 36],
                                itemStyle: { color: '#ff7d00' }
                            },
                            {
                                name: '僵尸客户',
                                type: 'line',
                                smooth: true,
                                data: [200, 195, 190, 185, 188, 183, 180, 178, 176, 174, 172, 170],
                                itemStyle: { color: '#f53f3f' }
                            }
                        ]
                    };
                    chart.setOption(option);
                    
                    window.addEventListener('resize', () => chart.resize());
                };
                
                // 初始化价值分布图
                const initTierChart = () => {
                    const chart = echarts.init(tierChart.value);
                    const option = {
                        tooltip: {
                            trigger: 'item',
                            formatter: '{b}: {c} ({d}%)'
                        },
                        legend: {
                            orient: 'vertical',
                            right: '5%',
                            top: 'center',
                            data: ['S级', 'A级', 'B级', 'C级', 'D级']
                        },
                        series: [
                            {
                                name: '客户价值分布',
                                type: 'pie',
                                radius: ['45%', '75%'],
                                center: ['35%', '50%'],
                                avoidLabelOverlap: false,
                                itemStyle: {
                                    borderRadius: 8,
                                    borderColor: '#fff',
                                    borderWidth: 2
                                },
                                label: {
                                    show: false
                                },
                                emphasis: {
                                    label: {
                                        show: true,
                                        fontSize: 16,
                                        fontWeight: 'bold'
                                    }
                                },
                                data: [
                                    { value: 12, name: 'S级', itemStyle: { color: '#ff7d00' } },
                                    { value: 45, name: 'A级', itemStyle: { color: '#165dff' } },
                                    { value: 128, name: 'B级', itemStyle: { color: '#00b42a' } },
                                    { value: 435, name: 'C级', itemStyle: { color: '#86909c' } },
                                    { value: 700, name: 'D级', itemStyle: { color: '#c9cdd4' } }
                                ]
                            }
                        ]
                    };
                    chart.setOption(option);
                    
                    window.addEventListener('resize', () => chart.resize());
                };
                
                onMounted(() => {
                    initTrendChart();
                    initTierChart();
                });
                
                return {
                    trendPeriod,
                    trendChart,
                    tierChart,
                    riskColumns,
                    riskData,
                    billingColumns,
                    billingData
                };
            }
        })
        .use(ArcoVue)
        .use(ArcoVueIcon)
        .mount('#app');
    </script>
</body>
</html>
