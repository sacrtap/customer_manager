<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理运营系统 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        primary: '#6366F1',
                        'primary-light': '#818CF8',
                        'primary-dark': '#4F46E5',
                        cta: '#10B981',
                        'cta-dark': '#059669',
                        background: '#F5F3FF',
                        surface: '#FFFFFF',
                        'text-primary': '#1E1B4B',
                        'text-secondary': '#4B5563',
                        'text-muted': '#9CA3AF',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 50%, #E0E7FF 100%); }
        .glass-effect { backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.95); }
        .input-focus:focus { box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); }
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(99, 102, 241, 0.2); }
        .animate-fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-left { animation: slideLeft 0.8s ease-out; }
        @keyframes slideLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-0 rounded-3xl overflow-hidden shadow-2xl animate-fade-in">
        
        <!-- Left Panel - Decorative -->
        <div class="hidden lg:block relative bg-gradient-to-br from-primary via-primary-light to-cta p-12 text-white overflow-hidden">
            <div class="absolute inset-0 opacity-10">
                <div class="absolute top-20 left-20 w-64 h-64 bg-white rounded-full blur-3xl"></div>
                <div class="absolute bottom-20 right-20 w-48 h-48 bg-white rounded-full blur-3xl"></div>
            </div>
            
            <div class="relative z-10 h-full flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur">
                            <i class="fas fa-users text-xl"></i>
                        </div>
                        <span class="text-2xl font-bold">客户运营中台</span>
                    </div>
                    
                    <h1 class="text-5xl font-bold mb-6 leading-tight">
                        数据驱动的<br>客户运营平台
                    </h1>
                    <p class="text-lg text-white/80 leading-relaxed max-w-md">
                        统一管理1320+客户，智能识别僵尸账号，自动化结算流程，
                        让运营效率提升70%以上
                    </p>
                </div>
                
                <div class="space-y-6">
                    <div class="flex items-center gap-4 bg-white/10 rounded-2xl p-4 backdrop-blur">
                        <div class="w-14 h-14 bg-cta/20 rounded-xl flex items-center justify-center">
                            <i class="fas fa-chart-line text-2xl"></i>
                        </div>
                        <div>
                            <div class="text-3xl font-bold">1320+</div>
                            <div class="text-sm text-white/70">客户数据统一管理</div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4 bg-white/10 rounded-2xl p-4 backdrop-blur">
                        <div class="w-14 h-14 bg-cta/20 rounded-xl flex items-center justify-center">
                            <i class="fas fa-bolt text-2xl"></i>
                        </div>
                        <div>
                            <div class="text-3xl font-bold">2小时</div>
                            <div class="text-sm text-white/70">结算单生成时间</div>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-6 text-sm text-white/60">
                    <span><i class="fas fa-shield-alt mr-2"></i>数据安全</span>
                    <span><i class="fas fa-sync mr-2"></i>实时同步</span>
                    <span><i class="fas fa-headset mr-2"></i>24/7支持</span>
                </div>
            </div>
        </div>
        
        <!-- Right Panel - Login Form -->
        <div class="glass-effect p-12 lg:p-16">
            <div class="max-w-md mx-auto">
                <div class="text-center mb-10">
                    <div class="lg:hidden flex items-center justify-center gap-3 mb-6">
                        <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center">
                            <i class="fas fa-users text-primary text-xl"></i>
                        </div>
                        <span class="text-2xl font-bold text-text-primary">客户运营中台</span>
                    </div>
                    <h2 class="text-3xl font-bold text-text-primary mb-2">欢迎回来</h2>
                    <p class="text-text-secondary">请输入您的账号信息进行登录</p>
                </div>
                
                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-text-primary mb-2">用户名</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-text-muted"></i>
                            <input type="text" 
                                   placeholder="请输入用户名" 
                                   class="input-focus w-full pl-12 pr-4 py-4 border-2 border-gray-100 rounded-xl text-text-primary placeholder-text-muted focus:border-primary focus:outline-none transition-all">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-text-primary mb-2">密码</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-text-muted"></i>
                            <input type="password" 
                                   placeholder="请输入密码" 
                                   class="input-focus w-full pl-12 pr-12 py-4 border-2 border-gray-100 rounded-xl text-text-primary placeholder-text-muted focus:border-primary focus:outline-none transition-all">
                            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-text-muted hover:text-text-primary">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary">
                            <span class="text-sm text-text-secondary">记住我</span>
                        </label>
                        <a href="#" class="text-sm text-primary hover:text-primary-dark font-medium">忘记密码？</a>
                    </div>
                    
                    <button type="submit" 
                            class="hover-lift w-full bg-primary hover:bg-primary-dark text-white font-semibold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
                        <span>登录系统</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                
                <div class="mt-8">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-200"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-white text-text-muted">或</span>
                        </div>
                    </div>
                    
                    <div class="mt-6 grid grid-cols-2 gap-4">
                        <button class="flex items-center justify-center gap-2 py-3 border-2 border-gray-100 rounded-xl hover:border-primary hover:text-primary transition-all">
                            <i class="fab fa-weixin text-xl"></i>
                            <span class="text-sm font-medium">微信登录</span>
                        </button>
                        <button class="flex items-center justify-center gap-2 py-3 border-2 border-gray-100 rounded-xl hover:border-primary hover:text-primary transition-all">
                            <i class="fas fa-qrcode text-xl"></i>
                            <span class="text-sm font-medium">扫码登录</span>
                        </button>
                    </div>
                </div>
                
                <div class="mt-10 pt-8 border-t border-gray-100">
                    <p class="text-center text-sm text-text-muted">
                        还没有账号？请联系 <a href="#" class="text-primary hover:text-primary-dark font-medium">系统管理员</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
